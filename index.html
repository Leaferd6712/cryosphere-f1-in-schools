<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cryosphere – F1 in Schools</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b1a;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 40px 20px 20px;
    }

    header h1 {
      margin: 0;
      font-size: 2.5rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    header p {
      margin-top: 10px;
      font-size: 1rem;
      color: #ccccff;
    }

    .button-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
      max-width: 500px;
      padding: 20px;
      box-sizing: border-box;
    }

    .nav-button {
      display: block;
      text-align: center;
      padding: 18px 24px;
      font-size: 1.1rem;
      font-weight: bold;
      text-decoration: none;
      color: #0b0b1a;
      background: #f5d547;
      border-radius: 12px;
      border: 2px solid #f5d547;
      transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.1s ease;
    }

    .nav-button:hover {
      background: #ffe878;
      box-shadow: 0 0 12px rgba(245, 213, 71, 0.6);
      transform: translateY(-2px);
    }

    footer {
      margin-top: auto;
      padding: 20px;
      font-size: 0.8rem;
      color: #8888aa;
      text-align: center;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 2rem;
      }
      .nav-button {
        font-size: 1rem;
        padding: 16px 18px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>CRYOSPHERE</h1>
    <p>F1 in Schools – Cadet Class</p>
  </header>

  <main class="button-container">
    <a class="nav-button" href="https://example.com/team" target="_blank">
      Meet the Team
    </a>
    <a class="nav-button" href="https://example.com/car-design" target="_blank">
      Car Design & Features
    </a>
    <a class="nav-button" href="https://example.com/testing" target="_blank">
      Testing & Data
    </a>
    <a class="nav-button" href="https://example.com/improvements" target="_blank">
      Improvements & Challenges
    </a>
    <a class="nav-button" href="https://example.com/sponsors" target="_blank">
      Sponsors & Support
    </a>
  </main>

  <footer>
    © 2026 Cryosphere. All Rights Reserved.
  </footer>
</body>
</html>
